services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - IRA_MONGO_URI=mongodb://host.docker.internal:27017
      - IRA_MONGO_DB=ira
      - IRA_REDIS_URI=redis://host.docker.internal:6379
      - IRA_LOG_LEVEL=INFO
      - IRA_WORKER_POOL_PRIORITY_SIZE=20
      - IRA_WORKER_POOL_GENERAL_SIZE=50
      - IRA_WORKER_POOL_OVERFLOW_SIZE=30
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  seeder:
    build: .
    command: python -m scripts.seed
    environment:
      - IRA_MONGO_URI=mongodb://host.docker.internal:27017
      - IRA_MONGO_DB=ira
      - IRA_REDIS_URI=redis://host.docker.internal:6379
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: "no"

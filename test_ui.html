<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ira Chat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: #0f0f0f; color: #e0e0e0; height: 100vh; display: flex; justify-content: center; align-items: center; }
  .container { width: 420px; background: #1a1a1a; border-radius: 12px; border: 1px solid #2a2a2a; overflow: hidden; }
  .header { padding: 16px 20px; border-bottom: 1px solid #2a2a2a; }
  .header h1 { font-size: 18px; font-weight: 600; }
  .header p { font-size: 12px; color: #888; margin-top: 4px; }
  .user-select { display: flex; gap: 6px; padding: 12px 20px; border-bottom: 1px solid #2a2a2a; }
  .user-btn { flex: 1; padding: 8px; border: 1px solid #333; border-radius: 6px; background: #222; color: #ccc; cursor: pointer; font-size: 11px; text-align: center; transition: all 0.15s; }
  .user-btn:hover { border-color: #555; }
  .user-btn.active { border-color: #4a9eff; color: #4a9eff; background: #1a2a3a; }
  .user-btn .tier { font-weight: 600; display: block; font-size: 12px; margin-bottom: 2px; }
  .user-btn .uid { font-size: 10px; color: #666; }
  .user-btn.active .uid { color: #4a9eff88; }
  .messages { height: 350px; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }
  .msg { padding: 10px 14px; border-radius: 10px; max-width: 90%; font-size: 13px; line-height: 1.5; word-wrap: break-word; }
  .msg.user { background: #2a4a7a; align-self: flex-end; border-bottom-right-radius: 2px; }
  .msg.bot { background: #2a2a2a; align-self: flex-start; border-bottom-left-radius: 2px; }
  .msg.error { background: #4a2020; }
  .msg .meta { font-size: 10px; color: #888; margin-top: 6px; display: flex; gap: 8px; flex-wrap: wrap; }
  .msg .meta span.flagged { color: #ff6b6b; font-weight: 600; }
  .input-area { display: flex; gap: 8px; padding: 12px 20px; border-top: 1px solid #2a2a2a; }
  .input-area input { flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid #333; background: #222; color: #e0e0e0; font-size: 13px; outline: none; }
  .input-area input:focus { border-color: #4a9eff; }
  .input-area button { padding: 10px 20px; border-radius: 8px; border: none; background: #4a9eff; color: #fff; font-weight: 600; cursor: pointer; font-size: 13px; }
  .input-area button:hover { background: #3a8eef; }
  .input-area button:disabled { background: #333; color: #666; cursor: not-allowed; }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #555; border-top-color: #4a9eff; border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Ira Chat</h1>
    <p>Select a user tier, type a message, hit send.</p>
  </div>
  <div class="user-select">
    <button class="user-btn active" onclick="selectUser(this, 'user_0000099', 'free')" data-uid="user_0000099">
      <span class="tier">Free</span>
      <span class="uid">user_0000099</span>
    </button>
    <button class="user-btn" onclick="selectUser(this, 'user_0990218', 'premium')" data-uid="user_0990218">
      <span class="tier">Premium</span>
      <span class="uid">user_0990218</span>
    </button>
    <button class="user-btn" onclick="selectUser(this, 'user_0000042', 'enterprise')" data-uid="user_0000042">
      <span class="tier">Enterprise</span>
      <span class="uid">user_0000042</span>
    </button>
  </div>
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <input type="text" id="msgInput" placeholder="Type a message..." autofocus>
    <button id="sendBtn" onclick="send()">Send</button>
  </div>
</div>
<script>
  let userId = 'user_0000099';
  const API = 'http://localhost:8000/chat';
  const msgBox = document.getElementById('messages');
  const input = document.getElementById('msgInput');
  const btn = document.getElementById('sendBtn');

  function selectUser(el, uid) {
    document.querySelectorAll('.user-btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    userId = uid;
    msgBox.innerHTML = '';
    input.focus();
  }

  input.addEventListener('keydown', e => { if (e.key === 'Enter' && !btn.disabled) send(); });

  async function send() {
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    btn.disabled = true;

    addMsg(text, 'user');

    const loading = document.createElement('div');
    loading.className = 'msg bot';
    loading.innerHTML = '<div class="spinner"></div>';
    msgBox.appendChild(loading);
    msgBox.scrollTop = msgBox.scrollHeight;

    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: userId, content: text, platform: 'app' }),
      });
      const data = await res.json();
      loading.remove();

      let meta = `${data.processing_time_ms}ms`;
      if (data.rate_limited) meta += ' <span class="flagged">RATE LIMITED</span>';
      if (data.safety_blocked) meta += ' <span class="flagged">SAFETY BLOCKED</span>';
      if (res.status === 503) meta += ' <span class="flagged">SHED (503)</span>';
      if (res.status === 429) meta += ' <span class="flagged">429</span>';

      const cls = (data.safety_blocked || res.status >= 400) ? 'bot error' : 'bot';
      addMsg(data.message || '(silent rate limit — no message)', cls, meta);
    } catch (err) {
      loading.remove();
      addMsg('Network error: ' + err.message, 'bot error');
    }
    btn.disabled = false;
    input.focus();
  }

  function addMsg(text, cls, metaHtml) {
    const div = document.createElement('div');
    div.className = 'msg ' + cls;
    div.textContent = text;
    if (metaHtml) {
      const m = document.createElement('div');
      m.className = 'meta';
      m.innerHTML = metaHtml;
      div.appendChild(m);
    }
    msgBox.appendChild(div);
    msgBox.scrollTop = msgBox.scrollHeight;
  }
</script>
</body>
</html>
